name: Keep Supabase Alive

on:
  schedule:
    # Run daily at 00:00 UTC to prevent pausing and handle GitHub Action scheduler delays
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          # Use --fail (-f) to make curl return a non-zero exit code on HTTP errors (e.g. 401, 404, 500).
          # This ensures the GitHub Action fails visibly instead of showing a false green checkmark.
          curl -f -s "${{ secrets.SUPABASE_URL }}/rest/v1/animations?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"

