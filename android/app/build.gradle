plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.philosia.signify"
    compileSdkVersion 36
    ndkVersion "28.2.13676358"  // Latest stable NDK r28

    compileOptions {
    // Using Java 21 as requested; keep desugaring enabled
    sourceCompatibility JavaVersion.VERSION_21
    targetCompatibility JavaVersion.VERSION_21
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
    // Match Kotlin JVM target to Java 21
    jvmTarget = '21'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lint{
        disable 'InvalidPackage'
        checkReleaseBuilds false
        abortOnError false
    }

    // Migrate to modern packaging DSL for AGP 8+
    packaging {
        jniLibs {
            // Some plugins bundle libc++_shared; pickFirst avoids duplicate conflicts
            pickFirsts += ['**/libc++_shared.so']
            // Exclude unused ABIs to reduce APK size
            excludes += ['**/x86/**', '**/x86_64/**', '**/mips/**', '**/mips64/**']
        }
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/*.SF',
                'META-INF/*.DSA',
                'META-INF/*.RSA'
            ]
        }
    }

    // Bundle configuration for Play Store optimization
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }

    defaultConfig {
        applicationId "com.philosia.signify"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        
        // NDK Configuration for ML Kit and native dependencies
        ndk {
            // Only include ABIs you actually need to reduce APK size
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
        
        // Performance optimizations
        renderscriptTargetApi 24
        renderscriptSupportModeEnabled false
        
        // Locale configuration to reduce APK size
        resConfigs "en", "hi" // English and Hindi only
        
        // multiDexEnabled true
    }

    buildFeatures {
        buildConfig = true
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug       // ⚠️ Use release signing for production
            minifyEnabled true                      // ✅ Enable code optimization
            shrinkResources true                    // ✅ Reduce APK size
            zipAlignEnabled true                    // ✅ Optimize APK alignment
            
            // Advanced optimization settings
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // Performance optimizations
            manifestPlaceholders = [enableCrashReporting: "true"]
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
            
            // APK splitting for different architectures (reduces size)
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }
        }

        debug {
            minifyEnabled false
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            manifestPlaceholders = [enableCrashReporting: "false"]
            buildConfigField "boolean", "ENABLE_LOGGING", "true"
        }
        
        // Profile build type for performance testing
        profile {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
            manifestPlaceholders = [enableCrashReporting: "true"]
            buildConfigField "boolean", "ENABLE_LOGGING", "false"
        }
    }
}

flutter {
    source '../..'
}
dependencies {
    // Core Android dependencies
    implementation "androidx.appcompat:appcompat:1.7.1"
    implementation "androidx.core:core-ktx:1.17.0"
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.20"
    // Core library desugaring for Java 21 compatibility
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}