# ✅ Optimized JVM settings for Java 24 compatibility
org.gradle.jvmargs=-Xmx8192m -XX:MaxMetaspaceSize=2048m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.country=US -Duser.language=en -Duser.variant -XX:+UseG1GC -XX:G1HeapRegionSize=32m --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --enable-native-access=ALL-UNNAMED
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=false
org.gradle.caching=true
# Android and AndroidX settings
android.useAndroidX=true
android.enableJetifier=true
# Reduce memory usage
android.nonTransitiveRClass=false
android.nonFinalResIds=false
# Flutter settings
flutter.track-widget-creation=false
# Kotlin settings with daemon stability improvements
kotlin.incremental=true
kotlin.incremental.usePreciseJavaTracking=true
kotlin.caching.enabled=true
kotlin.daemon.useFallbackStrategy=true
kotlin.compiler.execution.strategy=daemon
# ✅ Performance optimizations for ML workloads with stability focus
org.gradle.workers.max=2
android.enableR8.fullMode=true
# Kotlin daemon JVM options for Java 24 compatibility
kotlin.daemon.jvm.options=-Xmx4096m,-XX:MaxMetaspaceSize=1024m,-XX:+UseG1GC,--add-opens=java.base/java.lang=ALL-UNNAMED,--add-opens=java.base/java.io=ALL-UNNAMED,--add-opens=java.base/java.util=ALL-UNNAMED,--enable-native-access=ALL-UNNAMED
