org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.country=US -Duser.language=en -Duser.variant
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=false
org.gradle.caching=false
# Android and AndroidX settings
android.useAndroidX=true
android.enableJetifier=true
# Reduce memory usage
android.nonTransitiveRClass=false
android.nonFinalResIds=false
android.defaults.buildfeatures.buildconfig=true
# Flutter settings
flutter.track-widget-creation=false
# Kotlin settings
kotlin.incremental=true
kotlin.incremental.usePreciseJavaTracking=true
kotlin.caching.enabled=true
# Performance optimizations
org.gradle.workers.max=2
android.enableR8.fullMode=false
