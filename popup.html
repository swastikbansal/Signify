<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signify - ISL Translator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        height: 480px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #1c1c1c;
        color: #ffffff;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid #333333;
      }

      .header {
        padding: 24px 20px 16px 20px;
        text-align: center;
        border-bottom: 1px solid #2a2a2a;
      }

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .title {
        font-size: 22px;
        font-weight: 600;
        color: #ffbf00;
        letter-spacing: -0.5px;
      }

      .content {
        padding: 20px;
        height: calc(100% - 100px);
        overflow-y: auto;
      }

      .section {
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 12px;
        color: #b0b0b0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .favorite-sites {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 24px;
      }

      .site-btn {
        width: 44px;
        height: 44px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s ease;
        background: #2a2a2a;
      }

      .site-btn.youtube {
        background: #ff0000;
      }

      .site-btn.add {
        background: #2a2a2a;
        color: #666;
        font-size: 20px;
      }

      .site-btn:hover {
        transform: scale(1.05);
        opacity: 0.8;
      }

      .setting-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid #2a2a2a;
      }

      .setting-item:last-child {
        border-bottom: none;
      }

      .setting-label {
        font-size: 14px;
        font-weight: 400;
        color: #ffffff;
      }

      .toggle {
        position: relative;
        width: 44px;
        height: 24px;
        background: #333;
        border-radius: 12px;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .toggle.active {
        background: #ffbf00;
      }

      .toggle::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: #fff;
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: transform 0.2s ease;
      }

      .toggle.active::after {
        transform: translateX(20px);
      }

      .help-btn {
        width: 100%;
        padding: 12px;
        background: #2a2a2a;
        border: 1px solid #333;
        border-radius: 8px;
        color: #ffffff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 20px;
      }

      .help-btn:hover {
        background: #333;
        border-color: #ffbf00;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal-content {
        background: #2a2a2a;
        padding: 24px;
        border-radius: 12px;
        width: 280px;
        border: 1px solid #333;
      }

      .modal-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #ffbf00;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-label {
        display: block;
        font-size: 12px;
        color: #b0b0b0;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .form-input {
        width: 100%;
        padding: 8px 12px;
        background: #1c1c1c;
        border: 1px solid #333;
        border-radius: 6px;
        color: #ffffff;
        font-size: 14px;
      }

      .form-input:focus {
        outline: none;
        border-color: #ffbf00;
      }

      .modal-buttons {
        display: flex;
        gap: 8px;
      }

      .btn-cancel {
        flex: 1;
        padding: 8px 16px;
        background: #333;
        border: 1px solid #444;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        font-size: 14px;
      }

      .btn-ok {
        flex: 1;
        padding: 8px 16px;
        background: #ffbf00;
        border: none;
        border-radius: 6px;
        color: #1c1c1c;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <img
          src="icons/signify.svg"
          width="32"
          height="32"
          alt="Signify Logo"
        />
        <div class="title">Signify</div>
      </div>
    </div>

    <div class="content">
      <div class="section">
        <div class="section-title">Favourite sites</div>
        <div class="favorite-sites" id="favoriteSites">
          <button
            class="site-btn youtube"
            onclick="openSite('https://www.youtube.com')"
            title="YouTube"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
              <path
                d="M23.498 6.186a2.999 2.999 0 0 0-2.108-2.125C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.39.516A2.999 2.999 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a2.999 2.999 0 0 0 2.108 2.125C4.495 20.455 12 20.455 12 20.455s7.505 0 9.39-.516a2.999 2.999 0 0 0 2.108-2.125C24 15.93 24 12 24 12s0-3.93-.502-5.814ZM9.545 15.568V8.432L15.818 12l-6.273 3.568Z"
              />
            </svg>
          </button>
          <button class="site-btn add" onclick="addSite()" title="Add new site">
            +
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Settings</div>
        <div class="setting-item">
          <div class="setting-label">Auto-start on video play</div>
          <div
            class="toggle"
            id="autoStartToggle"
            onclick="toggleSetting('autoStart')"
          ></div>
        </div>
        <div class="setting-item">
          <div class="setting-label">Show floating avatar</div>
          <div
            class="toggle"
            id="showAvatarToggle"
            onclick="toggleSetting('showAvatar')"
          ></div>
        </div>
      </div>

      <button class="help-btn" onclick="openHelp()">
        Help & Tutorial Button
      </button>
    </div>

    <!-- Add Site Modal -->
    <div class="modal hidden" id="addSiteModal">
      <div class="modal-content">
        <div class="modal-title">Add New Site</div>
        <div class="form-group">
          <label class="form-label">Site Name</label>
          <input
            type="text"
            class="form-input"
            id="siteName"
            placeholder="e.g., GitHub"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Site URL</label>
          <input
            type="url"
            class="form-input"
            id="siteUrl"
            placeholder="https://example.com"
          />
        </div>
        <div class="modal-buttons">
          <button class="btn-cancel" onclick="hideAddSiteModal()">
            Cancel
          </button>
          <button class="btn-ok" onclick="addNewSite()">Add Site</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
