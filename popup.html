<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Signify</title>
    <style>
        :root {
            --bg:#111; --panel:#1d1d1d; --panel-alt:#151515; --accent:#ffc400; --accent-rgb:255,196,0; --text:#f5f5f5; --muted:#999;
        }
        * { box-sizing:border-box; }
        body { width:360px; margin:0; font-family:system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); padding:0; }
        .shell { border:1px solid #222; border-radius:14px; overflow:hidden; background:linear-gradient(145deg,#181818,#101010); min-height:460px; display:flex; flex-direction:column; }
        header { display:flex; align-items:center; gap:10px; padding:14px 18px 10px; }
    .brand-icon { width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:12px; background:#222; position:relative; overflow:hidden; }
    .brand-icon img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 0 4px rgba(var(--accent-rgb),0.35)); }
        h1 { font-size:20px; margin:0; font-weight:600; letter-spacing:.5px; color:var(--accent); }
        section { padding:0 18px 14px; }
        .section-title { font-size:13px; font-weight:600; letter-spacing:.5px; margin:0 0 8px; color:var(--accent); text-transform:uppercase; }
        /* Favourite sites */
        .sites-row { display:flex; gap:10px; flex-wrap:wrap; }
        .site-btn { width:46px; height:46px; background:#262626; border:1px solid #333; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s; position:relative; }
        .site-btn.youtube { background:#ff0000; border-color:#ff2d2d; color:#fff; font-size:20px; font-weight:700; }
        .site-btn.add { background:#232323; border:1px dashed #444; font-size:24px; color:#666; }
        .site-btn:hover { transform:translateY(-2px); box-shadow:0 4px 10px -4px rgba(0,0,0,.6); }
        /* Settings */
        .settings-panel { background:var(--panel); border:1px solid #262626; border-radius:12px; padding:12px 14px 6px; display:flex; flex-direction:column; gap:12px; }
        .setting { display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .setting-label { font-size:14px; font-weight:500; }
        .toggle { width:46px; height:26px; background:#333; border-radius:30px; position:relative; cursor:pointer; transition:.3s; box-shadow:inset 0 0 0 1px #444; }
        .toggle::after { content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#888; border-radius:50%; transition:.3s; box-shadow:0 2px 4px rgba(0,0,0,.4); }
        .toggle.active { background:linear-gradient(120deg,var(--accent), #ff9500); box-shadow:0 0 0 1px rgba(var(--accent-rgb),0.4), 0 4px 12px -2px rgba(var(--accent-rgb),0.55); }
        .toggle.active::after { transform:translateX(20px); background:#222; }
    .sub-setting { display:flex; flex-direction:column; gap:6px; margin-top:-4px; }
    .range-row { display:flex; align-items:center; gap:8px; }
    .range-row input[type=range] { flex:1; }
    .range-value { font-size:12px; color:#bbb; width:34px; text-align:right; }
        .help-btn { margin:10px 18px 18px; background:rgba(var(--accent-rgb),0.12); border:1px solid rgba(var(--accent-rgb),0.4); color:var(--accent); padding:14px 18px; font-size:14px; font-weight:600; border-radius:12px; cursor:pointer; text-align:center; letter-spacing:.5px; backdrop-filter:blur(4px); }
        .help-btn:hover { background:rgba(var(--accent-rgb),0.18); }
        footer { margin-top:auto; padding:6px 14px 12px; font-size:11px; color:#666; text-align:center; }
        /* Modal */
        .modal.hidden { display:none; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:99; }
        .modal-card { width:300px; background:#181818; border:1px solid #333; border-radius:14px; padding:18px 20px 20px; display:flex; flex-direction:column; gap:14px; }
        .modal-card h2 { margin:0; font-size:16px; font-weight:600; letter-spacing:.5px; }
        .fld { display:flex; flex-direction:column; gap:6px; }
        .fld label { font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:#bbb; }
        .fld input { background:#222; border:1px solid #333; border-radius:8px; padding:10px 12px; color:#eee; font-size:13px; }
        .fld input:focus { outline:2px solid rgba(var(--accent-rgb),0.55); border-color:var(--accent); }
        .modal-actions { display:flex; gap:10px; }
        .btn { flex:1; padding:10px 12px; border:none; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; letter-spacing:.3px; }
        .btn.primary { background:linear-gradient(135deg,var(--accent),#ff9100); color:#222; }
        .btn.secondary { background:#2b2b2b; color:#ddd; }
        .btn.secondary:hover { background:#323232; }
        .btn.primary:hover { filter:brightness(1.05); }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div class="brand-icon" aria-hidden="true"><img src="icons/icon128.png" alt="Signify" /></div>
            <h1>Signify</h1>
        </header>

        <section>
            <p class="section-title">Favourite sites</p>
            <div class="sites-row" id="favoriteSites">
                <button class="site-btn youtube" id="favYouTube" title="YouTube">▶</button>
                <button class="site-btn add" id="favAdd" title="Add site">+</button>
            </div>
        </section>

        <section>
            <div class="section-title">Settings</div>
            <div class="settings-panel">
                <div class="setting">
                    <div class="setting-label">Auto-start on video play</div>
                    <div id="autoStartToggle" class="toggle" role="switch" aria-checked="false" tabindex="0"></div>
                </div>
                <div class="setting">
                    <div class="setting-label">Avatar background</div>
                    <div id="panelBgToggle" class="toggle" role="switch" aria-checked="false" tabindex="0"></div>
                </div>
                <div class="sub-setting" id="panelBgControls" style="display:none;">
                    <div class="range-row">
                        <input type="range" id="panelAlphaRange" min="0" max="100" value="55" />
                        <span class="range-value" id="panelAlphaValue">55%</span>
                    </div>
                </div>
            </div>
        </section>

        <button class="help-btn" id="helpBtn">Help & Tutorial Button</button>
        <footer>Signify ISL Translator</footer>
    </div>

    <!-- Add Site Modal -->
    <div id="addSiteModal" class="modal hidden">
        <div class="modal-card">
            <h2>Add Favourite Site</h2>
            <div class="fld"><label for="siteName">Site Name</label><input id="siteName" maxlength="32" /></div>
            <div class="fld"><label for="siteUrl">Site URL</label><input id="siteUrl" placeholder="https://example.com" /></div>
            <div class="modal-actions">
                <button class="btn secondary" onclick="hideAddSiteModal()">Cancel</button>
                <button class="btn primary" onclick="addNewSite()">Add</button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
