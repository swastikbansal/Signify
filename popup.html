<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 350px;
            padding: 15px;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h2 {
            margin: 0;
            color: #333;
            font-size: 18px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .search-hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background-color: #45a049;
        }
        .btn-secondary {
            background-color: #f44336;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #da190b;
        }
        .status {
            margin-top: 10px;
            padding: 8px;
            background-color: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>ISL Animation Viewer</h2>
    </div>
    
    <div class="control-group">
        <label for="sentenceInput">Enter a sentence:</label>
        <input type="text" id="sentenceInput" placeholder="e.g., happy boy drink">
        <div class="search-hint">Plays ISL animations for known words in sequence.</div>
    </div>
    
    <div class="button-group">
        <button class="btn-primary" id="showViewer">Show Viewer</button>
        <button class="btn-secondary" id="hideViewer">Hide Viewer</button>
    </div>
    
    <div class="status" id="status">
        Ready. Enter a sentence and click "Show Viewer".
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
